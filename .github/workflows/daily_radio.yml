name: Daily Gunma-Saitama Radio

on:
  schedule:
    # 07:00 JSTまでにSpotifyへ反映させるための前倒し。
    # 04:45 JST(=19:45 UTC)起動 → GitHub Actionsの起動遅延(混雑時 最大~1時間)と
    # パイプライン処理・Spotify側のRSS取得ラグを見込んでも7時前に配信が揃う想定。
    # 毎時0分は遅延しやすいため、あえて45分起動にしている。
    - cron: "45 19 * * *"
  workflow_dispatch:      # 手動実行ボタン
    inputs:
      special:
        description: "特別編のID(specials/<id>.json)。空欄なら通常のニュース回"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    # 【日付ポリシー】各回は「振り返る前日(JST)」の日付でラベリングする。
    # ランナー既定のUTCのまま date.today()/pubDate を使うと、早朝JST(04:45頃)実行時は
    # UTC日付がちょうど「前日(JST)」に一致するため、タイトルもpubDateも同じUTC基準で
    # 綺麗にそろう(＝前日振り返りラベル)。
    # ※ TZ: Asia/Tokyo を足すと タイトル(JST=当日) と pubDate(UTC=前日) が1日ズレるので入れないこと。

    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-latest
        ports:
          - 50021:50021

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Wait for VOICEVOX engine
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:50021/version; then exit 0; fi
            sleep 2
          done
          echo "VOICEVOX engine did not start" && exit 1

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          # 特別編を指定した手動実行のときだけ、資料ファイルと専用の(日次と衝突しない)ファイル名IDを渡す
          SPECIAL_FILE: ${{ (github.event_name == 'workflow_dispatch' && inputs.special != '') && format('specials/{0}.json', inputs.special) || '' }}
          EPISODE_ID: ${{ (github.event_name == 'workflow_dispatch' && inputs.special != '') && format('special-{0}', inputs.special) || '' }}
        run: python scripts/run_pipeline.py

      - name: Commit feed.xml
        run: |
          git config user.name "radio-bot"
          git config user.email "radio-bot@users.noreply.github.com"
          git add feed/feed.xml
          git commit -m "Update feed.xml $(date +%F)" || echo "no changes"
          git push
